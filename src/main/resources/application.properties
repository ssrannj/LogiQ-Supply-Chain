# Server Configuration
spring.application.name=logiq-backend
server.port=${PORT:8080}

# Database Connection (In-Memory H2 for simple bootable starter)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:logiq_db}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate (Telling Java how to handle the tables)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# File Upload Path
upload.path=${UPLOAD_PATH:./uploads/receipts}

# Email Configuration (Placeholder/Mock)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# File Upload Stability
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB