# Server Configuration
spring.application.name=logiq-backend
server.port=8081

# Database Connection (In-Memory H2 for simple bootable starter)
spring.datasource.url=jdbc:h2:mem:logiq_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate (Telling Java how to handle the tables)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# File Upload Path
upload.path=./uploads/receipts

# Email Configuration (Placeholder/Mock)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# File Upload Stability
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB